############################# Server Basics #############################
# 节点角色：同时作为Broker（消息服务）和Controller（集群管理），开启Kraft模式（无需ZooKeeper）
process.roles=broker,controller

# 节点唯一ID：集群内每个节点的ID必须唯一（1/2/3分别对应kafka-1/kafka-2/kafka-3）
node.id=1

# Controller集群的投票节点列表：格式为<node.id>@<主机名/IP>:<控制器端口>，需包含所有Controller节点
controller.quorum.voters=1@kafka-1:9093,2@kafka-2:9093,3@kafka-3:9093

############################# Listener配置 #############################
# 监听器列表：定义节点监听的地址和端口，格式为<监听器名称>://<主机名>:<端口>（:表示绑定所有网卡）
# SASL_PLAINTEXT：供客户端和Broker间通信的监听器（SASL认证+明文传输）
# CONTROLLER：供Controller节点间Raft协议通信的监听器（仅集群内部使用）
listeners=SASL_PLAINTEXT://:9092,CONTROLLER://kafka-1:9093,INTER_BROKER://kafka-1:19092

# Broker间通信使用的监听器名称：指定集群内Broker之间通信的监听器（需与listeners中的名称一致）
inter.broker.listener.name=INTER_BROKER

# 对外公告的监听器地址：客户端实际连接的地址，需填写可被外部访问的主机名/IP
# 注意：同一监听器名称可绑定多个地址（内网+外网），但不能包含节点ID（如1@）
advertised.listeners=INTER_BROKER://kafka-1:19092,SASL_PLAINTEXT://192.168.239.164:29092

# 控制器使用的监听器名称：指定Controller节点间通信的监听器（需与listeners中的CONTROLLER对应）
controller.listener.names=CONTROLLER

# 监听器名称与安全协议的映射表：将自定义监听器名称绑定到Kafka预定义的安全协议
# CONTROLLER:PLAINTEXT：控制器监听器使用明文协议（无认证，仅内部通信）
# PLAINTEXT:PLAINTEXT：备用监听器名称，映射到明文协议
# SSL:SSL：备用监听器名称，映射到SSL加密协议
# SASL_PLAINTEXT:SASL_PLAINTEXT：SASL认证+明文传输协议
# SASL_SSL:SASL_SSL：SASL认证+SSL加密协议
listener.security.protocol.map=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,SSL:SSL,SASL_PLAINTEXT:SASL_PLAINTEXT,SASL_SSL:SASL_SSL,INTER_BROKER:SASL_PLAINTEXT

############################# 安全认证配置 #############################
# Broker间通信的SASL认证机制：指定使用PLAIN（用户名/密码）认证
sasl.mechanism.inter.broker.protocol=PLAIN

# 服务端启用的SASL认证机制列表：仅启用PLAIN机制（可多个，用逗号分隔）
sasl.enabled.mechanisms=PLAIN

############################# 网络线程配置 #############################
# 网络处理线程数：用于接收网络请求和发送响应的线程数（建议3-5，根据CPU核心数调整）
num.network.threads=3
# IO处理线程数：用于处理请求（如磁盘IO）的线程数（建议为CPU核心数的2倍）
num.io.threads=8
# 套接字发送缓冲区大小：SO_SNDBUF的大小，单位字节（默认100KB）
socket.send.buffer.bytes=102400
# 套接字接收缓冲区大小：SO_RCVBUF的大小，单位字节（默认100KB）
socket.receive.buffer.bytes=102400
# 最大请求大小：服务端接受的最大请求字节数（防止OOM，默认100MB）
socket.request.max.bytes=104857600

############################# 日志存储配置 #############################
# 日志数据存储目录：Kafka的消息日志、元数据等数据的存储路径
# 注意：/tmp为临时目录，重启服务器后数据丢失，生产环境需改为持久化目录（如/data/kafka/logs）
log.dirs=/data/kafka/logs
# 默认分区数：新建主题时的默认分区数（建议设为集群节点数，如3，提升并行性）
num.partitions=3
# 每个数据目录的恢复线程数：用于日志恢复和刷盘的线程数（RAID阵列可适当增加）
num.recovery.threads.per.data.dir=1

############################# 内部主题配置 #############################
# 消费者偏移量主题的副本因子：__consumer_offsets主题的分区副本数（建议与集群节点数一致，保证高可用）
offsets.topic.replication.factor=3
# 事务状态日志主题的副本因子：__transaction_state主题的分区副本数（建议与集群节点数一致）
transaction.state.log.replication.factor=3
# 事务状态日志的最小同步副本数：必须小于等于副本因子（建议设为2，保证数据可靠性）
transaction.state.log.min.isr=2

############################# 日志刷新策略 #############################
# 消息会立即写入文件系统，但默认情况下，我们只使用fsync（）延迟同步操作系统缓存。以下配置控制将数据刷新到磁盘。这里有一些重要的权衡：
# 1.持久性：如果不使用复制，未清理的数据可能会丢失。
# 2.延迟：当刷新发生时，非常大的刷新间隔可能会导致延迟峰值，因为将有大量数据需要刷新。
# 3.吞吐量：刷新通常是最昂贵的操作，小的刷新间隔可能会导致过多的寻道。
# 下面的设置允许配置刷新策略，以便在一段时间后或每N条消息（或两者兼有）刷新数据。这可以全局完成，并在每个主题的基础上覆盖

# 强制将数据刷新到磁盘之前要接受的消息数
#log.flush.interval.messages=10000

# 在我们强制刷新之前，消息可以在日志中停留的最长时间
#log.flush.interval.ms=1000

############################# 日志保留策略 #############################
# 日志保留时间：日志文件的最大保留时长（默认7天，168小时）
log.retention.hours=168
# 日志段大小：单个日志文件的最大大小（默认1GB，达到后新建日志段）
log.segment.bytes=1073741824
# 日志保留检查间隔：定期检查日志是否需要删除的时间间隔（默认5分钟，300000毫秒）
log.retention.check.interval.ms=300000